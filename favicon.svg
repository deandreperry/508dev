    dominant-baseline="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="28"
    font-weight="700"
    class="text"
  >
    508
  </text>

  <circle class="dot" cx="50" cy="14" r="4"/>
</svg>
